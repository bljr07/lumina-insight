services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: lumina-broker
    ports:
      - "5672:5672"   # Standard AMQP (For Flask/Consumers)
      - "15672:15672" # Management UI (http://localhost:15672)
      - "15674:15674" # WebSocket (Web-STOMP) for Browser Extension
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    # This command enables the plugin before starting the server
    command: >
      sh -c "rabbitmq-plugins enable rabbitmq_web_stomp && rabbitmq-server"
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "check_running"]
      interval: 30s
      timeout: 10s
      retries: 5