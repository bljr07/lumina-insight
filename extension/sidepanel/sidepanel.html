<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lumina Insight — Ghost Mode</title>

  <!-- Load Tailwind CSS via CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f0fdfa',
              100: '#ccfbf1',
              500: '#14b8a6', // Teal Theme
              900: '#134e4a',
            },
            ui: {
              bg: '#0f172a', // Slate 900
              card: '#1e293b', // Slate 800
              text: '#f8fafc',
              muted: '#94a3b8'
            }
          }
        }
      }
    }
  </script>

  <!-- Load Vue 3 via CDN (global build) -->
  <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>

  <!-- Custom Scoped Styles -->
  <link rel="stylesheet" href="styles.css">

  <!-- Chart.js for Radar/Timeline Visualization -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body class="bg-ui-bg text-ui-text min-h-screen font-sans antialiased overflow-x-hidden p-4">
  <!-- Vue Root Element -->
  <div id="app"></div>

  <!-- Application Logic -->
  <script src="app.js"></script>
</body>

</html>
