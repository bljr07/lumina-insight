<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina Insight Nudges</title>
  <link rel="stylesheet" href="sidepanel.css" />
</head>
<body>
  <div class="sidepanel-container">
    <header class="header">
      <div class="header-content">
        <h1>Lumina</h1>
        <span class="badge">Insight</span>
      </div>
      <p class="subtitle">AI Learning Assistant</p>
    </header>

    <div class="nudge-card" id="nudge-container">
      <div class="nudge-icon" id="nudge-icon">👋</div>
      <h2 class="nudge-title" id="nudge-title">Welcome</h2>
      <p class="nudge-message" id="nudge-message">
        As you learn, I'll provide real-time suggestions to help you stay focused and overcome challenges.
      </p>
    </div>
    
  </div>
  <script src="sidepanel.js"></script>
</body>
</html>
