<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lumina Insight</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="popup-container">
    <header class="popup-header">
      <h1>Lumina Insight</h1>
      <span class="badge">MV3</span>
    </header>

    <div class="state-card">
      <div class="label">Learning State</div>
      <div id="state-display" data-testid="state-display" class="state-value">--</div>
    </div>

    <div class="info-row">
      <div class="info-item">
        <div class="label">Platform</div>
        <div id="platform-display" data-testid="platform-display" class="info-value">--</div>
      </div>
      <div class="info-item">
        <div class="label">Packets</div>
        <div id="packet-count" data-testid="packet-count" class="info-value">0</div>
      </div>
    </div>

    <div id="status" data-testid="status" class="status-bar">Loading...</div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
