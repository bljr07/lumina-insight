name: Web App Build Check

on:
  push:
    paths:
      - "web_app/**"
      - ".github/workflows/web-app-build.yml"
  pull_request:
    paths:
      - "web_app/**"
      - ".github/workflows/web-app-build.yml"

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web_app
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web_app/package-lock.json

      - name: Install Dependencies
        run: npm ci

      - name: Build
        run: npm run build
